<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGC Attendance Pro</title>
    <!-- PWA Manifest Link -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f97316;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
        }

        /* Modern Header */
        .header {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .header h2 {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #93c5fd;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #date {
            margin-top: 10px;
            font-size: 13px;
            opacity: 0.8;
        }

        /* Top-Right Menu Button */
        .menu-btn {
            position: absolute;
            top: 25px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 650px;
            margin: 24px auto;
            padding: 0 16px;
            padding-bottom: 100px;
        }

        /* Modern Attendance Cards */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
            flex: 1;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Inputs & Selects */
        .time, select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: #f8fafc;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .time:focus, select:focus {
            border-color: var(--primary);
        }

        .time {
            font-weight: 600;
        }

        /* Badges */
        .badge {
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-align: center;
            min-width: 70px;
        }

        .leave { background: #fee2e2; color: #ef4444; }
        .half { background: #ffedd5; color: #f97316; }

        /* Floating WhatsApp Button */
        .share-container {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 16px;
            pointer-events: none;
        }

        .share {
            max-width: 618px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: #22c55e;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            pointer-events: auto;
            transition: background 0.2s, transform 0.2s;
        }

        .share:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        /* Modal / Popup Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            color: var(--text-main);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .add-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .add-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 14px;
        }

        .add-box input:focus {
            border-color: var(--primary);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .add-btn:hover {
            background: var(--primary-dark);
        }

        /* Manage List in Popup */
        .manage-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px;
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .manage-item:last-child {
            border-bottom: none;
        }

        .manage-name {
            font-size: 14px;
            font-weight: 500;
        }

        .remove-btn {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .remove-btn:hover {
            background: #fca5a5;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>NORTHERN GOODS CARRIER</h1>
    <h2>VARANASI ATTENDANCE</h2>
    <div id="date"></div>
    <button class="menu-btn" onclick="toggleModal(true)">⋮</button>
</div>

<div class="container">
    <div id="staffList"></div>
</div>

<div class="share-container">
    <button class="share" onclick="shareWhatsApp()">📤 Share on WhatsApp</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <div class="modal-header">
            <h3>Manage Staff</h3>
            <button class="close-btn" onclick="toggleModal(false)">&times;</button>
        </div>
        
        <div class="add-box">
            <input id="newStaff" type="text" placeholder="Enter Staff Name">
            <button class="add-btn" onclick="addStaff()">Add</button>
        </div>

        <div class="manage-list" id="manageList"></div>
    </div>
</div>

<script>
// Service Worker Registration for PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker Registered'))
        .catch(err => console.log('Service Worker Failed', err));
    });
}

const attendance = {
    "ANAND TRIPATHI": "09:30",
    "SACHIN YADAV": "09:30",
    "SHIVAM GUPTA": "09:30",
    "SAURABH": "09:30",
    "RAM BHAROS YADAV": "09:30",
    "PRINCE TIWARI": "09:30",
    "AAKASH": "09:30",
    "VISHAL": "09:30"
};

function render() {
    let out = "";
    for (let n in attendance) {
        let v = attendance[n];
        out += `<div class="card"><div class="row">
        <div class="name">${n}</div>
        <div class="controls">`;

        if (v === "LEAVE") {
            out += `<span class="badge leave">LEAVE</span>`;
        } else if (v === "HALF DAY") {
            out += `<span class="badge half">HALF DAY</span>`;
        } else {
            out += `<input class="time" type="time" value="${v}" onchange="attendance['${n}']=this.value">`;
        }

        out += `
        <select onchange="changeStatus('${n}', this.value)">
            <option value="">Status</option>
            <option value="PRESENT">Present</option>
            <option value="LEAVE">Leave</option>
            <option value="HALF DAY">Half Day</option>
        </select>
        </div></div></div>`;
    }
    document.getElementById("staffList").innerHTML = out;
    renderManageList();
}

function renderManageList() {
    let out = "";
    for (let n in attendance) {
        out += `
        <div class="manage-item">
            <span class="manage-name">${n}</span>
            <button class="remove-btn" onclick="removeStaff('${n}')">Delete</button>
        </div>`;
    }
    document.getElementById("manageList").innerHTML = out ? out : '<div style="text-align:center; padding:10px; color:#64748b; font-size:14px;">No staff added</div>';
}

function changeStatus(name, val) {
    if (val === "LEAVE") attendance[name] = "LEAVE";
    else if (val === "HALF DAY") attendance[name] = "HALF DAY";
    else if (val === "PRESENT") attendance[name] = "09:30";
    render();
}

function addStaff() {
    let n = document.getElementById("newStaff").value.trim().toUpperCase();
    if (!n) return;
    attendance[n] = "09:30";
    document.getElementById("newStaff").value = "";
    render();
}

function removeStaff(n) {
    if(confirm(`Are you sure you want to remove ${n}?`)) {
        delete attendance[n];
        render();
    }
}

// Fixed function (Removed .style.style)
function toggleModal(show) {
    document.getElementById("modalOverlay").style.display = show ? "flex" : "none";
}

// Close Modal on Outside Click
function closeModalOutside(e) {
    if (e.target.id === "modalOverlay") {
        toggleModal(false);
    }
}

function shareWhatsApp() {
    let txt = `NORTHERN GOODS CARRIER\nVARANASI ATTENDANCE\n\nDate: ${document.getElementById('date').innerText}\n\n----------------------------\n\n`;
    for (let n in attendance) {
        txt += `${n}: ${attendance[n]}\n`;
    }
    txt += `\n----------------------------\nReport by Varanasi Depot`;
    window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
}

document.getElementById("date").innerText = new Date().toDateString();
render();
</script>
</body>
</html>
